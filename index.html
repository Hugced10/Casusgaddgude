<!DOCTYPE html><html lang="sv"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Casus din gädd guide</title> <style> :root{ --bg:#071a3a; --card:#0d2a5c; --gold:#d4af37; --gold-soft:#e6c65a; --text:#ffffff; } body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(180deg,#071a3a,#0a1f44); color: var(--text); display:flex;align-items:center;justify-content:center;min-height:100vh; }.app { max-width:650px; width:100%; padding:20px; } h1 { color: var(--gold); text-align:center; } .card { background: var(--card); padding:25px; border-radius:16px; box-shadow:0 10px 30px #00000066; animation:fadeIn 0.4s ease; } @keyframes fadeIn{ from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} } button { width:100%; margin:8px 0; padding:12px; background:var(--gold); border:none; border-radius:8px; cursor:pointer; font-weight:bold; } button:hover{ background:var(--gold-soft); } #result { display:none; margin-top:20px; padding:20px; border:2px solid var(--gold); border-radius:12px; } </style> </head> <body><div class="app"> <h1>Casus din gädd guide</h1> <div class="card" id="quiz"></div> <div id="result"></div> </div><script> const questions = [ { text: "Hur länge har du fiskat?", answers: [ {text:">1 år", type:"x"}, {text:"1-3 år", type:"x"}, {text:"3-5 år", type:"y"}, {text:"5+ år", type:"z"} ] }, { text: "Vart fiskar du?", answers: [ {text:"Från land", type:"xy"}, {text:"Från båt", type:"yz"} ] }, { text: "Hur ofta fiskar du?", answers: [ {text:"Ibland på sommaren", type:"x"}, {text:"1 gång i veckan", type:"y"}, {text:"Så mycket jag kan", type:"z"} ] }, { text: "Hur mycket tycker du om att fiska?", answers: [ {text:"Lite", type:"x"}, {text:"Medel", type:"y"}, {text:"Mycket", type:"z"} ] } ]; let current = 0; let x=0,y=0,z=0; function showQuestion(){ const q = questions[current]; let html = <h2>${q.text}</h2>; q.answers.forEach(a => { html += <button onclick="answer('${a.type}')">${a.text}</button>; }); document.getElementById("quiz").innerHTML = html; } function answer(type){ if(type.includes('x')) x++; if(type.includes('y')) y++; if(type.includes('z')) z++; current++; if(current < questions.length){ showQuestion(); } else { showResult(); } } function showResult(){ let resultType; // Din regel: välj lägre vid lika if (x >= y && x >= z) { resultType = 'x'; } else if (y >= x && y >= z) { resultType = 'y'; } else { resultType = 'z'; } let text = "<h2>Ditt resultat</h2>"; if(resultType === 'x'){ text += Använd dig av små drag.<br> Gör det inte för komplicerat med vevstopp och annat.<br> Experimentera med färger.<br> Rör på dig ofta.; } else if(resultType === 'y'){ text += Använd medelstora drag som jerkbaits, wobblers eller jiggar (10–15 cm).<br> Pröva dig fram när det gäller rörelse på draget som till exempel vevstopp.<br> Experimentera med färger.; } else{ text += Använd dig av större drag men även vad du själv tror på.<br> Gör mycket vevstopp och försök att få ditt drag i bästa möjliga rörelse.<br> Experimentera med färger.; } document.getElementById("quiz").style.display = "none"; document.getElementById("result").innerHTML = text; document.getElementById("result").style.display = "block"; } showQuestion(); </script></body> </html>
